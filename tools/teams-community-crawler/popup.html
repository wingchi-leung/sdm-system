<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teams 社区爬虫</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Teams 社区爬虫</h1>
      <p class="hint">打开目标社区的“帖子”页后开始。程序只读取当前账号有权查看的内容。</p>
      <form id="crawler-form">
        <label>
          作者包含
          <input id="author-filter" value="Inc" required />
        </label>
        <label>
          最多检查主帖
          <input id="max-posts" type="number" min="0" value="0" />
          <small>0 表示全部；每条都会打开对话检查 Inc 回复</small>
        </label>
        <label>
          每次滚动等待
          <input id="delay-ms" type="number" min="300" step="100" value="800" />
          <small>毫秒；网速慢可改为 1200</small>
        </label>
        <button id="start-button" type="submit">开始抓取并下载</button>
      </form>
      <p id="status" role="status" aria-live="polite">尚未开始</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
