version: '3.8'

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sdm-tunnel
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./tunnel/config.yml:/etc/cloudflared/config.yml:ro
      - ./tunnel/certs:/etc/cloudflared/certs:ro
    command: tunnel --config /etc/cloudflared/config.yml run
    extra_hosts:
      - "host.docker.internal:host-gateway"
  # 数据库 MySQL
  mysql:
    image: mysql:8.0
    container_name: sdm-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/table.sql:/docker-entrypoint-initdb.d/01-table.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 FastAPI
  backend:
    image: ${BACKEND_IMAGE}
    container_name: sdm-backend
    restart: unless-stopped
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DB=${MYSQL_DB}
      - JWT_SECRET=${JWT_SECRET}
      - DB_ECHO=${DB_ECHO:-false}
      - REQUIRE_HTTPS_FOR_LOGIN=${REQUIRE_HTTPS_FOR_LOGIN:-true}
      - LOGIN_RATE_LIMIT_COUNT=${LOGIN_RATE_LIMIT_COUNT:-10}
      - LOGIN_RATE_LIMIT_WINDOW_SECONDS=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
      - WECHAT_PAY_MCH_ID=${WECHAT_PAY_MCH_ID}
      - WECHAT_PAY_API_V3_KEY=${WECHAT_PAY_API_V3_KEY}
      - WECHAT_PAY_SERIAL_NO=${WECHAT_PAY_SERIAL_NO}
      - WECHAT_PAY_PRIVATE_KEY_PATH=${WECHAT_PAY_PRIVATE_KEY_PATH:-/run/secrets/wechat_pay/apiclient_key.pem}
      - WECHAT_PAY_PUBLIC_KEY_PATH=${WECHAT_PAY_PUBLIC_KEY_PATH:-/run/secrets/wechat_pay/wx_public_key.pem}
      - WECHAT_PAY_PUBLIC_KEY_ID=${WECHAT_PAY_PUBLIC_KEY_ID}
      - WECHAT_PAY_NOTIFY_URL=${WECHAT_PAY_NOTIFY_URL}
      - SENSITIVE_RSA_PRIVATE_KEY=${SENSITIVE_RSA_PRIVATE_KEY}
      - SENSITIVE_RSA_PUBLIC_KEY=${SENSITIVE_RSA_PUBLIC_KEY}
      - SENSITIVE_RSA_KEY_ID=${SENSITIVE_RSA_KEY_ID:-v1}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - LOCAL_UPLOAD_DIR=${LOCAL_UPLOAD_DIR:-uploads}
      - STORAGE_BASE_URL=${STATIC_BASE_URL}/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./secrets/wechat_pay:/run/secrets/wechat_pay:ro
    depends_on:
      mysql:
        condition: service_healthy

  # 前端 React (craco)
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: sdm-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${API_BASE_URL}/api/v1
      - REACT_APP_STATIC_URL=${STATIC_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql-data:
  

networks:
  default:
    name: sdm-network
    driver: bridge
